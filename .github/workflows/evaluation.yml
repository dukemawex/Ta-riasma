name: Evaluation Suite

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which evaluation to run"
        required: true
        default: both
        type: choice
        options:
          - multilingual
          - duplicate
          - both

jobs:
  run-evaluation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        run: |
          missing=0
          for key in ANTHROPIC_BASE_URL ANTHROPIC_AUTH_TOKEN ANTHROPIC_API_KEY GEMINI_API_KEY; do
            if [ -z "${!key}" ]; then
              echo "$key is not set. Add it in Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Install dependencies
        working-directory: evaluation
        run: pip install -r requirements.txt

      - name: Run multilingual evaluation
        if: ${{ github.event.inputs.target == 'multilingual' || github.event.inputs.target == 'both' }}
        working-directory: evaluation
        run: python eval_multilingual.py

      - name: Run duplicate evaluation
        if: ${{ github.event.inputs.target == 'duplicate' || github.event.inputs.target == 'both' }}
        working-directory: evaluation
        run: python eval_duplicates.py

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results-${{ github.run_id }}
          path: evaluation/results/
          if-no-files-found: error
